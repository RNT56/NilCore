name: Release

# Cross-compile one binary for macOS and Linux on amd64/arm64. Runs on every
# version tag (attaching binaries to a GitHub Release) and on demand. P1-T13.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create releases / upload assets

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [darwin, linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}
        run: |
          out="nilcore-${GOOS}-${GOARCH}"
          ldflags="-s -w"
          if [[ "${RELEASE_VERSION}" != "dev" ]]; then
            if [[ ! "${RELEASE_VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$ ]]; then
              echo "refusing invalid release version: ${RELEASE_VERSION}" >&2
              exit 1
            fi
            ldflags="${ldflags} -X main.version=${RELEASE_VERSION}"
          fi
          go build -trimpath -ldflags "${ldflags}" -o "dist/${out}" ./cmd/nilcore
          # The Linux amd64 matrix leg is runnable on the hosted builder. Prove the
          # release tag reached the binary, rather than publishing a `dev (<sha>)`
          # build whose filename and release page claim a different version.
          if [[ "${RELEASE_VERSION}" != "dev" && "${GOOS}/${GOARCH}" == "linux/amd64" ]]; then
            test "$("dist/${out}" version)" = "nilcore ${RELEASE_VERSION}"
          fi
          # Publish a per-binary SHA-256 so the curl|sh installer can verify integrity
          # before running the downloaded binary. The file holds "<hash>  <asset>" so a
          # consumer can `sha256sum -c` it directly.
          ( cd dist && sha256sum "${out}" > "${out}.sha256" )
      - uses: actions/upload-artifact@v4
        with:
          name: nilcore-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    name: attach to release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Verify assets and assemble the checksums manifest
        # Refuse to publish a partial or corrupt release. The installer requires the
        # per-binary records, and SHA256SUMS must cover exactly the four supported targets.
        run: scripts/verify-release-assets.sh dist
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        # Create the release with the binaries + checksums; if it already exists, upload to it.
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* --repo "${GITHUB_REPOSITORY}" --title "${GITHUB_REF_NAME}" --generate-notes \
            || gh release upload "${GITHUB_REF_NAME}" dist/* --repo "${GITHUB_REPOSITORY}" --clobber
