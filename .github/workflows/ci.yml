name: CI

# The gate, automated: every push to main and every PR must build, vet, test,
# and lint clean before it can merge (CLAUDE.md §3, P0-T01).
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: make verify
    runs-on: ubuntu-latest
    # internal/integrate exercises real git merges; a hosted runner has no ambient
    # git identity, and those tests run git under a hardened env that ignores config
    # files (GIT_CONFIG_GLOBAL=/dev/null), so `git config` won't help — the identity
    # must come from these env vars, which git honors over config and HardenedEnv
    # preserves. Without them, merge commits fail with "Committer identity unknown"
    # (a pre-existing, change-independent failure).
    env:
      GIT_AUTHOR_NAME: nilcore-ci
      GIT_AUTHOR_EMAIL: ci@nilcore.local
      GIT_COMMITTER_NAME: nilcore-ci
      GIT_COMMITTER_EMAIL: ci@nilcore.local
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build, vet, test
        run: make verify

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

  # The real verifier for the namespace sandbox (P7-T01): its Landlock + user-
  # namespace confinement can only be exercised on Linux, never on the maintainer's
  # macOS host. This job enables unprivileged user namespaces on the runner and runs
  # the confinement suite with NILCORE_SANDBOX_MUST_RUN=1, so the security tests
  # FAIL rather than silently skip if the backend is unavailable — no false green.
  sandbox-linux:
    name: namespace sandbox (linux confinement)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Enable unprivileged user namespaces
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          sudo sysctl -w kernel.unprivileged_userns_clone=1 || true
          sudo sysctl -w user.max_user_namespaces=15000 || true
      - name: Confinement tests must run (not skip)
        env:
          NILCORE_SANDBOX_MUST_RUN: "1"
        run: go test -v -run 'TestNamespace|TestPick|TestNew|TestAvailable' ./internal/sandbox/

  # The real verifier for behavioral browser verification (D1): the headless-browser
  # run needs a real Chromium, which the hermetic `make verify` job has not — so the
  # LIVE navigate + screenshot path is exercised HERE (mirroring sandbox-linux above,
  # which is also environment-dependent and CI-only). It uses the Google Chrome
  # preinstalled on the runner (falling back to apt chromium), drives the pure-Go
  # nilcore-browser driver against a fixture page, and asserts the JSON observation
  # (title + a real screenshot + extracted text) AND the fail-closed behavior when no
  # browser is present — so a missing browser can never produce a false green.
  browser-e2e:
    name: browser behavioral verification (D1 live run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Locate a headless browser
        run: |
          BROWSER="$(command -v google-chrome-stable || command -v google-chrome || command -v chromium-browser || command -v chromium || true)"
          if [ -z "$BROWSER" ]; then
            sudo apt-get update && sudo apt-get install -y --no-install-recommends chromium-browser
            BROWSER="$(command -v chromium-browser || command -v chromium)"
          fi
          [ -n "$BROWSER" ] || { echo "no headless browser available on the runner"; exit 1; }
          echo "NILCORE_CHROMIUM=$BROWSER" >> "$GITHUB_ENV"
          echo "using: $BROWSER"; "$BROWSER" --version || true
      - name: Build the nilcore-browser driver
        run: CGO_ENABLED=0 go build -o /tmp/nilcore-browser ./cmd/tools/nilcore-browser
      - name: Live run — navigate a fixture, screenshot, assert the JSON observation
        run: |
          mkdir -p /tmp/fixture
          printf '%s\n' '<!doctype html><html><head><title>NilCore E2E Fixture</title></head><body><h1>hello from the fixture</h1><p>behavioral verification works</p></body></html>' > /tmp/fixture/index.html
          python3 -m http.server 8099 --directory /tmp/fixture >/tmp/httpd.log 2>&1 &
          SRV=$!
          for _ in $(seq 1 30); do curl -fsS http://127.0.0.1:8099/ >/dev/null 2>&1 && break; sleep 0.3; done
          set +e
          /tmp/nilcore-browser --url http://127.0.0.1:8099/ --format json > /tmp/obs.json 2>/tmp/obs.err
          rc=$?
          kill "$SRV" 2>/dev/null || true
          set -e
          echo "driver exit: $rc"; echo "--- stderr ---"; cat /tmp/obs.err; echo "--- first 400 bytes ---"; head -c 400 /tmp/obs.json; echo
          [ "$rc" -eq 0 ] || { echo "driver must exit 0 on a reachable page"; cat /tmp/httpd.log; exit 1; }
          jq -e '(.title | test("NilCore"))'       /tmp/obs.json
          jq -e '(.screenshot_b64 | length) > 100' /tmp/obs.json
          jq -e '(.text | length) > 0'             /tmp/obs.json
      - name: Live flow — type + click drive a fixture, assert the post-action observation
        run: |
          mkdir -p /tmp/flow
          # The fixture's button sets document.title to "flow-after:<input value>" on
          # click, so the title proves the type+click actions actually drove the page.
          # base64-encoded to keep the HTML (and its quotes) intact through YAML.
          echo 'PCFkb2N0eXBlIGh0bWw+PGh0bWw+PGhlYWQ+PHRpdGxlPmZsb3ctYmVmb3JlPC90aXRsZT48L2hlYWQ+PGJvZHk+PGlucHV0IGlkPSJuYW1lIj48YnV0dG9uIGlkPSJnbyIgb25jbGljaz0iZG9jdW1lbnQudGl0bGU9J2Zsb3ctYWZ0ZXI6Jytkb2N1bWVudC5nZXRFbGVtZW50QnlJZCgnbmFtZScpLnZhbHVlIj5HbzwvYnV0dG9uPjwvYm9keT48L2h0bWw+' | base64 -d > /tmp/flow/index.html
          python3 -m http.server 8098 --directory /tmp/flow >/tmp/flowhttpd.log 2>&1 &
          SRV=$!
          for _ in $(seq 1 30); do curl -fsS http://127.0.0.1:8098/ >/dev/null 2>&1 && break; sleep 0.3; done
          set +e
          /tmp/nilcore-browser --url http://127.0.0.1:8098/ \
            --actions '[{"action":"type","selector":"#name","text":"alice"},{"action":"click","selector":"#go"},{"action":"wait","ms":300}]' \
            --format json > /tmp/flow.json 2>/tmp/flow.err
          rc=$?
          kill "$SRV" 2>/dev/null || true
          set -e
          echo "driver exit: $rc"; echo "--- stderr ---"; cat /tmp/flow.err; echo "--- observation ---"; head -c 500 /tmp/flow.json; echo
          [ "$rc" -eq 0 ] || { echo "interactive flow must exit 0 on a reachable fixture"; cat /tmp/flowhttpd.log; exit 1; }
          # The title only becomes flow-after:alice if BOTH the type and the click landed.
          jq -e '(.title | test("flow-after:alice"))' /tmp/flow.json
      - name: Fails closed when no browser is present (must exit non-zero)
        run: |
          if NILCORE_CHROMIUM=/nonexistent/not-a-browser /tmp/nilcore-browser --url http://127.0.0.1:8099/ --format json; then
            echo "driver exited 0 with no browser — it must fail closed"; exit 1
          fi
          echo "fail-closed confirmed"
