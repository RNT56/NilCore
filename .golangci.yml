# golangci-lint configuration for NilCore.
# CI pins the linter version (see .github/workflows/ci.yml) so this format
# stays stable. The Makefile is a frozen contract file, so CI invokes
# golangci-lint directly rather than through a make target.
run:
  timeout: 5m

linters:
  enable:
    - errcheck      # unchecked errors
    - govet         # suspicious constructs
    - ineffassign   # ineffectual assignments
    - staticcheck   # broad static analysis
    - gofmt         # formatting
    - goimports     # import grouping/ordering

issues:
  # Show every finding; a clean tree is the bar (CLAUDE.md §4).
  max-issues-per-linter: 0
  max-same-issues: 0
